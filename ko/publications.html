            <div class="brand-sub">컴퓨터공학과</div>

        <nav class="site-nav" aria-label="주요 메뉴">
          <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-controls="primary-menu">
            메뉴
          </button>
          <ul class="nav-list" id="primary-menu" data-nav-menu>
            <li><a data-nav-link href="./index.html">홈</a></li>

          <p>
            저널, 학술대회, 프리프린트, 특허 성과를 확인할 수 있습니다. 목록은 JSON 데이터 파일을 기반으로

          <div data-publications-root>
