name: Daily Notion Sync

on:
  schedule:
    - cron: '30 15 * * *' # Every day 00:30 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notion-daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync CMS from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_NEWS_DB_ID: ${{ secrets.NOTION_NEWS_DB_ID }}
          NOTION_NEWS_DATA_SOURCE_ID: ${{ secrets.NOTION_NEWS_DATA_SOURCE_ID }}
          NOTION_TEAM_DB_ID: ${{ secrets.NOTION_TEAM_DB_ID }}
          NOTION_TEAM_DATA_SOURCE_ID: ${{ secrets.NOTION_TEAM_DATA_SOURCE_ID }}
          NOTION_PUBLICATIONS_DB_ID: ${{ secrets.NOTION_PUBLICATIONS_DB_ID }}
          NOTION_PUBLICATIONS_DATA_SOURCE_ID: ${{ secrets.NOTION_PUBLICATIONS_DATA_SOURCE_ID }}
        run: npm run cms:sync:notion

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A public/data public/assets/img/news/notion public/assets/img/team/notion public/assets/img/publications/covers

          if git diff --cached --quiet; then
            echo "No content changes to commit."
            exit 0
          fi

          git commit -m "chore: daily notion sync"
          git push origin HEAD:main
